# -- Language Configuration --
# Congo reads the site title and the site-level description from the language
# config, not from hugo.toml. The theme ships its own config/_default/languages.en.toml
# (title = "Congo"), which is merged in at lower priority -- so the title MUST
# be set here, not in hugo.toml, or the theme's value wins and the site renders
# as "Congo".
#
# `locale`/`label` are the current Hugo keys; the older `languageCode`/
# `languageName` spellings are deprecated as of Hugo v0.158.0 and warn on build.
locale = "en-US"
label = "English"
direction = "ltr"
title = "The Aerie"
weight = 1

[params]
  description = "A personal blog from San Francisco: cycling, transit, and housing advocacy, side projects, and photos from the city and beyond."

  # Restricts the homepage's recent-articles list to the blog section.
  mainSections = ["posts"]

  # Congo has no "tagline" parameter. The profile homepage layout renders
  # author.name as the <h1> and author.headline as the <h2> beneath it, which
  # is the theme's equivalent of PaperMod's homeInfoParams -- it is what puts
  # the tagline on the page itself rather than only in <title>. name is left
  # unset so it falls back to site.Title ("The Aerie").
  [params.author]
    headline = "The stairs are a FEATURE"

    # Rendered by Congo's author-links.html partial in the homepage profile
    # block. Each entry is a single-key table keyed by an icon name; the key
    # must match a filename under the theme's assets/icons/ (verified against
    # v2.14.0: instagram.svg, flickr.svg, github.svg, rss.svg, strava.svg,
    # goodreads.svg exist) or the link silently renders nothing.
    #
    # author-links.html emits `{{ $url | safeURL }}` verbatim -- it does not
    # pass the value through relURL/absURL, so a config string can't be made
    # baseURL-subpath-aware the way template-authored hrefs elsewhere in this
    # repo are (see the "Fix URL generation for GitHub Pages project subpath"
    # commit). The RSS href is therefore hardcoded to the current GitHub Pages
    # subpath baseURL rather than a bare "/index.xml", which would 404 there.
    # Update this alongside baseURL at the eventual brosnahan.org DNS cutover.
    [[params.author.links]]
      instagram = "https://www.instagram.com/gophixit/"

    [[params.author.links]]
      flickr = "https://flickr.com/photos/gophixit/"

    [[params.author.links]]
      github = "https://github.com/nbrosnahan"

    [[params.author.links]]
      rss = "https://nbrosnahan.github.io/AerieWebsite/index.xml"

    [[params.author.links]]
      strava = "https://www.strava.com/athletes/163364"

    # Restores the Goodreads "Books" widget the WordPress sidebar carried,
    # which was lost in the migration to Congo.
    [[params.author.links]]
      goodreads = "https://www.goodreads.com/user/show/44690683-nick-brosnahan"
