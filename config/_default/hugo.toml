# -- Site Configuration --
# Congo expects its configuration split across config/_default/*.toml rather
# than a single root hugo.toml. See https://jpanther.github.io/congo/docs/getting-started/
#
# Published to the custom domain brosnahan.org via static/CNAME + repo
# Settings -> Pages. .github/workflows/deploy.yml passes --baseURL from the
# Pages API output at build time.
baseURL = "https://brosnahan.org/"

defaultContentLanguage = "en"

# Enables Hugo's built-in robots.txt generation, rendered from
# layouts/robots.txt (overriding Congo's own template at that same path;
# see the file for what it adds beyond Congo's default).
enableRobotsTXT = true

# Congo is consumed as a Hugo Module (not a submodule), pinned in go.mod to
# the upstream release tag v2.14.0.
[module]
  [[module.imports]]
    path = "github.com/jpanther/congo/v2"

[taxonomies]
  tag = "tags"
  category = "categories"

[pagination]
  pagerSize = 20

# Congo's own module config declares this same block, but structured (non-map)
# keys like [outputs] are not inherited from the theme module into the site's
# own hugo.toml -- once the site defines hugo.toml at all, [outputs] must be
# restated here or no index.json is emitted, even with enableSearch = true.
# Verified: removing this block drops public/index.json from the build.
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Makes the built-in {{< youtube >}} shortcode (used by
# content/posts/superman-sneak-peek.md) emit youtube-nocookie.com instead of
# www.youtube.com. This stops the embed from setting Google cookies on page
# load regardless of whether the visitor ever plays the video. Verified
# against the built output: without this, the embed renders as
# src="https://www.youtube.com/embed/...".
[privacy]
  [privacy.youtube]
    privacyEnhanced = true
