# -- Site Configuration --
# Congo expects its configuration split across config/_default/*.toml rather
# than a single root hugo.toml. See https://jpanther.github.io/congo/docs/getting-started/
#
# Published to a GitHub Pages project URL with a subpath. Revert to
# "https://brosnahan.org/" at the DNS cutover.
baseURL = "https://nbrosnahan.github.io/AerieWebsite/"

defaultContentLanguage = "en"

# Congo is consumed as a Hugo Module (not a submodule), pinned in go.mod to
# the upstream release tag v2.14.0.
[module]
  [[module.imports]]
    path = "github.com/jpanther/congo/v2"

[taxonomies]
  tag = "tags"
  category = "categories"

[pagination]
  pagerSize = 20

# Congo's own module config declares this same block, but structured (non-map)
# keys like [outputs] are not inherited from the theme module into the site's
# own hugo.toml -- once the site defines hugo.toml at all, [outputs] must be
# restated here or no index.json is emitted, even with enableSearch = true.
# Verified: removing this block drops public/index.json from the build.
[outputs]
  home = ["HTML", "RSS", "JSON"]
