# Published to a GitHub Pages project URL with a subpath. Revert to
# "https://brosnahan.org/" at the DNS cutover.
baseURL = "https://nbrosnahan.github.io/AerieWebsite/"
locale = "en-US"
title = "The Aerie"

[params]
  tagline = "The stairs are a feature"
  description = "The Aerie — a personal blog at brosnahan.org."

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  posts = "/:year/:month/:day/:slug/"

[permalinks.term]
  tags = "/tag/:slug/"
  categories = "/category/:slug/"

[pagination]
  pagerSize = 20
